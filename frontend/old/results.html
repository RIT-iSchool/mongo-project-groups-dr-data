<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Results — ClinicalSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-results">

  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-cross">✛</span>
        <span class="logo-text">ClinicalSearch</span>
      </a>
      <div class="header-search-bar">
        <input
          type="text"
          id="headerSearch"
          class="header-input"
          placeholder="New search…"
          onkeydown="if(event.key==='Enter') doNewSearch()"
          autocomplete="off"
        />
        <button class="btn-header-search" onclick="doNewSearch()">&#8594;</button>
      </div>
      <span class="header-tag">ISTE-438 &nbsp;·&nbsp; Group 3: Dr. Data</span>
    </div>
  </header>

  <main class="results-main">

    <aside class="results-sidebar">
      <div class="sidebar-card">
        <h3 class="sidebar-title">Refine Search</h3>

        <label class="field-label" for="sideQ">Keyword</label>
        <input type="text" id="sideQ" class="side-input" placeholder="condition, sponsor…" />

        <label class="field-label" style="margin-top:14px">Location</label>
        <input type="text" id="sideLat" class="side-input" placeholder="Latitude" />
        <input type="text" id="sideLng" class="side-input" placeholder="Longitude" style="margin-top:6px" />
        <input type="text" id="sideRadius" class="side-input" placeholder="Radius (miles)" style="margin-top:6px" />

        <button class="btn-sidebar" onclick="doRefine()">Apply</button>
        <a href="/" class="sidebar-reset">&#8592; New Search</a>
      </div>
    </aside>

    <section class="results-panel">
      <div class="results-header" id="resultsHeader">
        <span class="results-count" id="resultsCount"></span>
        <span class="results-query" id="resultsQuery"></span>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Searching clinical trials…</p>
      </div>

      <div id="errorState" class="error-state" style="display:none">
        <p>&#9888; Could not load results. Make sure the server is running.</p>
      </div>

      <div id="emptyState" class="empty-state" style="display:none">
        <p class="empty-icon">&#9906;</p>
        <p>No trials found matching your criteria.</p>
        <a href="/" class="btn-secondary" style="display:inline-block;margin-top:16px">Try another search</a>
      </div>

      <ul id="resultsList" class="results-list" style="display:none"></ul>

      <div id="paginationBar" class="pagination-bar" style="display:none">
        <button class="btn-page" id="prevBtn" onclick="changePage(-1)" disabled>&#8592; Prev</button>
        <span id="pageInfo" class="page-info"></span>
        <button class="btn-page" id="nextBtn" onclick="changePage(1)">Next &#8594;</button>
      </div>
    </section>

  </main>

  <script>
    const API = 'http://172.16.0.66:5001';
    const PAGE_SIZE = 15;
    let allResults  = [];
    let currentPage = 1;

    (function init() {
      const params = new URLSearchParams(window.location.search);
      const q      = params.get('q')      || '';
      const lat    = params.get('lat')    || '';
      const lng    = params.get('lng')    || '';
      const radius = params.get('radius') || '';

      document.getElementById('sideQ').value      = q;
      document.getElementById('sideLat').value    = lat;
      document.getElementById('sideLng').value    = lng;
      document.getElementById('sideRadius').value = radius;

      let label = '';
      if (q)      label += `"${q}"`;
      if (lat)    label += (label ? ' · ' : '') + `within ${radius} mi of (${parseFloat(lat).toFixed(3)}, ${parseFloat(lng).toFixed(3)})`;
      document.getElementById('resultsQuery').textContent = label ? `for ${label}` : '';

      let apiUrl;
      if (lat && lng && radius) {
        apiUrl = `${API}/api/search/geo?lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}&radius=${encodeURIComponent(radius)}`;
        if (q) apiUrl += `&q=${encodeURIComponent(q)}`;
      } else if (q) {
        apiUrl = `${API}/api/search?q=${encodeURIComponent(q)}`;
      } else {
        showEmpty();
        return;
      }

      fetchResults(apiUrl);
    })();

    async function fetchResults(url) {
      try {
        const res  = await fetch(url);
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        allResults  = data;
        currentPage = 1;

        if (data.length === 0) {
          showEmpty();
        } else {
          renderPage();
        }
      } catch (e) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorState').style.display = 'block';
        console.error(e);
      }
    }

    function renderPage() {
      document.getElementById('loadingState').style.display = 'none';

      const total = allResults.length;
      const pages = Math.ceil(total / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const slice = allResults.slice(start, start + PAGE_SIZE);

      document.getElementById('resultsCount').textContent =
        `${total.toLocaleString()} result${total !== 1 ? 's' : ''}`;

      const list = document.getElementById('resultsList');
      list.innerHTML = '';
      list.style.display = 'block';

      slice.forEach((study, i) => {
        const li  = document.createElement('li');
        li.className = 'result-card';
        li.style.animationDelay = `${i * 40}ms`;

        const phase     = study.Phases            || 'Phase Unknown';
        const status    = study.Overall_Status    || '';
        const sponsor   = study.Lead_Sponsor_Name || '';
        const condition = study.Conditions        || '';
        const brief     = study.Brief_Summary     || study.Brief_Title || '';
        const snippet   = brief.length > 200 ? brief.slice(0, 200) + '…' : brief;
        const location  = study.location_label    || '';
        const nctId     = study.NCT_Number        || study.nct_id || '';

        const statusClass = status.toLowerCase().replace(/\s+/g, '-');

        li.innerHTML = `
          <div class="card-meta-row">
            <span class="card-phase">${escHtml(phase)}</span>
            <span class="card-status ${statusClass}">${escHtml(status)}</span>
          </div>
          <h2 class="card-title">${escHtml(study.Study_Title || study.Brief_Title || 'Untitled Study')}</h2>
          <p class="card-condition">${escHtml(condition)}</p>
          <p class="card-snippet">${escHtml(snippet)}</p>
          <div class="card-footer">
            ${sponsor   ? `<span class="card-footer-item">&#9670; ${escHtml(sponsor)}</span>`   : ''}
            ${location  ? `<span class="card-footer-item">&#8982; ${escHtml(location)}</span>`  : ''}
            ${nctId     ? `<span class="card-footer-item card-nct">${escHtml(nctId)}</span>`    : ''}
          </div>
        `;

        li.addEventListener('click', () => {
          window.location.href = '/detail?id=' + encodeURIComponent(study._id);
        });

        list.appendChild(li);
      });

      const bar = document.getElementById('paginationBar');
      if (pages > 1) {
        bar.style.display = 'flex';
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${pages}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === pages;
      } else {
        bar.style.display = 'none';
      }
    }

    function showEmpty() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display  = 'block';
    }

    function changePage(dir) {
      currentPage += dir;
      renderPage();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function doNewSearch() {
      const term = document.getElementById('headerSearch').value.trim();
      if (term) window.location.href = '/results?q=' + encodeURIComponent(term);
    }

    function doRefine() {
      const q      = document.getElementById('sideQ').value.trim();
      const lat    = document.getElementById('sideLat').value.trim();
      const lng    = document.getElementById('sideLng').value.trim();
      const radius = document.getElementById('sideRadius').value.trim();

      if (!q && !(lat && lng && radius)) {
        alert('Please enter a keyword or complete location fields.');
        return;
      }
      let url = '/results?';
      if (q)                      url += `q=${encodeURIComponent(q)}&`;
      if (lat && lng && radius)   url += `lat=${encodeURIComponent(lat)}&lng=${encodeURIComponent(lng)}&radius=${encodeURIComponent(radius)}`;
      window.location.href = url;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>

</body>
</html>
